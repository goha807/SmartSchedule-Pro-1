<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Schedule Pro</title>
    <style>
        :root {
            --bg-image: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --danger: #ef4444;
            --success: #22c55e;
            --text: #f1f5f9;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-image);
            background-size: cover;
            background-attachment: fixed;
            color: var(--text);
            margin: 0;
            padding: 20px;
            padding-bottom: 120px;
            min-height: 100vh;
            transition: background 0.5s ease;
        }

        /* Glass effect */
        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .controls { display: flex; gap: 10px; flex-wrap: wrap; }

        .btn {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            background: rgba(255,255,255,0.1);
        }
        
        .btn:hover { background: rgba(255,255,255,0.2); }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { filter: brightness(1.1); background: var(--accent); }
        
        .btn-outline { border: 1px solid var(--accent); color: var(--accent); background: transparent; }
        .btn-outline.active { background: var(--accent); color: #000; }

        /* Grid */
        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .day-column { padding: 15px; }
        .day-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--accent);
            text-align: center;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .lesson-card {
            margin-bottom: 15px;
            padding: 15px;
            position: relative;
            transition: transform 0.2s, border-color 0.2s;
            border-left: 4px solid transparent;
            overflow: hidden;
        }

        .lesson-card.active {
            border-left-color: var(--success);
            box-shadow: 0 0 25px rgba(34, 197, 94, 0.15);
            background: linear-gradient(90deg, rgba(34, 197, 94, 0.1) 0%, rgba(30, 41, 59, 0.7) 100%);
        }

        .card-progress-track {
            position: absolute; bottom: 0; left: 0; height: 3px; width: 100%;
            background: rgba(255,255,255,0.1); display: none;
        }
        .lesson-card.active .card-progress-track { display: block; }
        .card-progress-fill { height: 100%; background: var(--success); width: 0%; transition: width 1s linear; }

        .time-badge {
            font-size: 0.8rem; background: rgba(0,0,0,0.4); padding: 4px 8px;
            border-radius: 6px; margin-bottom: 8px; display: inline-block;
            font-family: monospace;
        }

        .status-msg { font-size: 0.85rem; font-weight: bold; margin-top: 8px; color: var(--success); }

        .edit-btn {
            position: absolute; top: 10px; right: 10px; display: none;
            background: rgba(255,255,255,0.1); border: none; color: white;
            padding: 6px; border-radius: 6px; cursor: pointer;
        }
        .edit-btn:hover { background: var(--accent); color: black; }

        [data-edit-mode="true"] .edit-btn { display: block; }
        [data-edit-mode="true"] .lesson-card { border: 1px dashed rgba(255,255,255,0.2); cursor: pointer; }
        [data-edit-mode="true"] .lesson-card:hover { transform: translateY(-3px); border-color: var(--accent); }

        /* Modal */
        .modal-backdrop {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8);
            display: none; justify-content: center; align-items: center;
            z-index: 100; opacity: 0; transition: opacity 0.3s;
        }
        .modal-backdrop.open { opacity: 1; }

        .modal {
            width: 90%; max-width: 450px; padding: 25px;
            display: flex; flex-direction: column; gap: 15px;
            transform: scale(0.9); transition: transform 0.3s;
        }
        .modal-backdrop.open .modal { transform: scale(1); }

        .form-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 0.9rem; color: #94a3b8; }
        input, select {
            background: rgba(15, 23, 42, 0.8); border: 1px solid #334155;
            color: white; padding: 12px; border-radius: 8px; outline: none;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2); }

        .time-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* Widget */
        .current-widget {
            position: fixed; bottom: 20px; left: 20px; width: 320px; z-index: 90;
            border-left: 4px solid var(--accent);
            transform: translateY(150%); transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .current-widget.visible { transform: translateY(0); }
        .widget-timer { font-family: monospace; font-size: 1.2rem; color: var(--success); font-weight: bold; }

        /* Theme Selector in Modal */
        .theme-options { display: flex; gap: 10px; margin-top: 5px; }
        .theme-circle {
            width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
            border: 2px solid transparent;
        }
        .theme-circle.selected { border-color: white; transform: scale(1.1); }

        @media (max-width: 600px) {
            header { flex-direction: column; align-items: stretch; }
            .current-widget { left: 10px; right: 10px; width: auto; bottom: 10px; }
        }
    </style>
</head>
<body data-edit-mode="false">

<header>
    <h1>📅 Schedule<span style="color:var(--accent)">Pro</span></h1>
    <div class="controls">
        <button class="btn" onclick="openSettings()">🎨 Тема</button>
        <button class="btn btn-outline" id="toggleEdit" onclick="toggleEditMode()">
            ✏️ Ред.
        </button>
        <button class="btn btn-primary" onclick="share()">🔗 Поділитися</button>
    </div>
</header>

<div class="schedule-grid" id="grid"></div>

<div class="current-widget glass" id="activeWidget">
    <div style="padding: 15px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:0.75rem; text-transform:uppercase; letter-spacing:1px; color:var(--accent);">
            <span>🔴 Зараз йде</span>
            <span id="widgetTimes"></span>
        </div>
        <div>
            <div style="font-size:1.1rem; font-weight:bold; margin-bottom:5px;" id="widgetName">Назва</div>
            <div style="display:flex; align-items:center; gap:10px;">
                <span>Залишилось:</span>
                <span class="widget-timer" id="widgetCountdown">00 хв</span>
            </div>
            <a id="widgetLink" href="#" target="_blank" style="margin-top:10px; display:inline-block; padding:5px 10px; background:rgba(255,255,255,0.1); border-radius:5px; color:var(--accent); text-decoration:none; font-size:0.85rem;">🎥 Підключитися</a>
        </div>
    </div>
</div>

<div class="modal-backdrop" id="modal">
    <div class="modal glass">
        <h2 id="modalTitle">Налаштувати урок</h2>
        <div class="form-group">
            <label>Назва предмету</label>
            <input type="text" id="nameInp" list="subjectsList" placeholder="Напр: Математика" oninput="autoFillLink()">
            <datalist id="subjectsList"></datalist>
        </div>
        <div class="time-inputs">
            <div class="form-group">
                <label>Початок</label>
                <input type="time" id="startInp">
            </div>
            <div class="form-group">
                <label>Кінець</label>
                <input type="time" id="endInp">
            </div>
        </div>
        <div class="form-group">
            <label>Посилання (Zoom/Meet)</label>
            <input type="text" id="linkInp" placeholder="https://zoom.us/...">
            <small style="color: gray; font-size: 0.7rem;">Якщо предмет вже був, посилання підтягнеться саме.</small>
        </div>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="btn btn-primary" style="flex:2" onclick="saveLesson()">Зберегти</button>
            <button class="btn" style="flex:1" onclick="deleteLesson()" style="background:var(--danger)">Видалити</button>
            <button class="btn" style="flex:1" onclick="closeModal('modal')">Закрити</button>
        </div>
    </div>
</div>

<div class="modal-backdrop" id="settingsModal">
    <div class="modal glass">
        <h2>🎨 Налаштування вигляду</h2>
        
        <div class="form-group">
            <label>Колір акценту</label>
            <div class="theme-options">
                <div class="theme-circle" style="background:#38bdf8" onclick="setAccent('#38bdf8')"></div>
                <div class="theme-circle" style="background:#f472b6" onclick="setAccent('#f472b6')"></div>
                <div class="theme-circle" style="background:#a78bfa" onclick="setAccent('#a78bfa')"></div>
                <div class="theme-circle" style="background:#fbbf24" onclick="setAccent('#fbbf24')"></div>
                <div class="theme-circle" style="background:#22c55e" onclick="setAccent('#22c55e')"></div>
            </div>
        </div>

        <div class="form-group">
            <label>Фон сторінки</label>
            <select id="bgSelect" onchange="changeBackground(this.value)">
                <option value="default">Темний синій (Default)</option>
                <option value="space">Космос (Deep Dark)</option>
                <option value="sunset">Захід сонця (Gradient)</option>
                <option value="forest">Ліс (Dark Green)</option>
                <option value="black">Чистий чорний (OLED)</option>
            </select>
        </div>

        <div style="margin-top:10px;">
            <button class="btn btn-primary" style="width:100%" onclick="closeModal('settingsModal')">Готово</button>
        </div>
    </div>
</div>

<script>
    const days = ["Понеділок", "Вівторок", "Середа", "Четвер", "П'ятниця", "Субота", "Неділя"];
    let schedule = JSON.parse(localStorage.getItem('gh-schedule')) || {};
    let userSettings = JSON.parse(localStorage.getItem('gh-settings')) || { accent: '#38bdf8', bg: 'default' };
    
    let currentEditKey = null;
    let activeLessonGlobal = null;

    // --- INIT ---
    function init() {
        applySettings();
        
        // Перевірка URL параметрів (імпорт розкладу)
        const params = new URLSearchParams(window.location.search);
        if (params.get('data')) {
            try {
                // Використовуємо decoding для кирилиці
                const jsonString = decodeURIComponent(escape(atob(params.get('data'))));
                const importedSchedule = JSON.parse(jsonString);
                
                if(confirm("Знайдено розклад у посиланні! Завантажити його? (Ваш поточний буде замінено)")) {
                    schedule = importedSchedule;
                    localStorage.setItem('gh-schedule', JSON.stringify(schedule));
                    // Очистити URL щоб не питало знову при оновленні
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
            } catch(e) { 
                console.error("Data error", e); 
                alert("Помилка читання посилання");
            }
        }

        render();
        setInterval(render, 5000); // Оновлення часу
    }

    // --- RENDERING ---
    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        activeLessonGlobal = null;
        
        const now = new Date();
        const currentTime = now.getHours() * 60 + now.getMinutes();
        const currentDay = (now.getDay() + 6) % 7; // Пн = 0

        days.forEach((day, dIdx) => {
            const dayCol = document.createElement('div');
            dayCol.className = 'day-column';
            dayCol.innerHTML = `<div class="day-title">${day}</div>`;

            // 8 слотів для уроків
            for(let sIdx = 0; sIdx < 8; sIdx++) {
                const key = `${dIdx}-${sIdx}`;
                const data = schedule[key] || null;
                dayCol.appendChild(createLessonCard(data, key, dIdx === currentDay, currentTime));
            }
            grid.appendChild(dayCol);
        });

        updateWidget(currentTime);
        updateDatalist();
    }

    function createLessonCard(data, key, isToday, currentTime) {
        const card = document.createElement('div');
        card.className = 'lesson-card glass';
        card.onclick = (e) => {
            if(document.body.getAttribute('data-edit-mode') === 'true') openEditModal(key);
        };
        
        if (!data) {
            card.innerHTML = `<div style="opacity:0.3; font-size:0.8rem; text-align:center;">---</div>
                              <button class="edit-btn" onclick="openEditModal('${key}')">➕</button>`;
            return card;
        }

        const start = timeToMin(data.start);
        const end = timeToMin(data.end);
        let statusHtml = '';
        let progressBarHtml = '';

        if (isToday) {
            if (currentTime >= start && currentTime < end) {
                // ACTIVE LESSON
                card.classList.add('active');
                const duration = end - start;
                const percent = Math.min(100, Math.max(0, ((currentTime - start) / duration) * 100));
                
                statusHtml = `<div class="status-msg">⏱️ Йде урок (${end - currentTime} хв)</div>`;
                progressBarHtml = `<div class="card-progress-track"><div class="card-progress-fill" style="width: ${percent}%"></div></div>`;
                
                activeLessonGlobal = { ...data, remaining: end - currentTime };
            } else if (currentTime < start && start - currentTime <= 60) {
                statusHtml = `<div class="status-msg" style="color:var(--accent)">🔔 Через ${start - currentTime} хв</div>`;
            }
        }

        card.innerHTML = `
            <button class="edit-btn" onclick="event.stopPropagation(); openEditModal('${key}')">⚙️</button>
            <div class="time-badge">🕒 ${data.start} - ${data.end}</div>
            <div style="font-weight:bold; font-size:1.1rem; margin-bottom:5px;">${data.name}</div>
            ${data.link ? `<a href="${data.link}" target="_blank" onclick="event.stopPropagation()" style="color:var(--accent); font-size:0.85rem; text-decoration:none;">🔗 Вхід на урок</a>` : ''}
            ${statusHtml}
            ${progressBarHtml}
        `;
        return card;
    }

    // --- WIDGET ---
    function updateWidget(currentTime) {
        const widget = document.getElementById('activeWidget');
        if (activeLessonGlobal) {
            widget.classList.add('visible');
            document.getElementById('widgetName').textContent = activeLessonGlobal.name;
            document.getElementById('widgetTimes').textContent = `${activeLessonGlobal.start} - ${activeLessonGlobal.end}`;
            document.getElementById('widgetCountdown').textContent = `${activeLessonGlobal.remaining} хв`;
            const linkBtn = document.getElementById('widgetLink');
            if(activeLessonGlobal.link) {
                linkBtn.style.display = 'inline-block';
                linkBtn.href = activeLessonGlobal.link;
            } else {
                linkBtn.style.display = 'none';
            }
        } else {
            widget.classList.remove('visible');
        }
    }

    // --- LOGIC & HELPERS ---
    function timeToMin(t) {
        if(!t) return 0;
        const [h, m] = t.split(':').map(Number);
        return h * 60 + m;
    }

    // Розумний пошук часу
    function suggestTime(slotIndex) {
        // Перевіряємо інші дні для цього ж слота (наприклад, 1-й урок)
        for(let d = 0; d < 7; d++) {
            const checkKey = `${d}-${slotIndex}`;
            if(schedule[checkKey]) {
                return { start: schedule[checkKey].start, end: schedule[checkKey].end };
            }
        }
        return { start: '08:00', end: '08:45' }; // Дефолт
    }

    // Розумний пошук посилання
    function autoFillLink() {
        const name = document.getElementById('nameInp').value.trim();
        if(!name) return;
        
        // Шукаємо цей предмет у всьому розкладі
        const foundKey = Object.keys(schedule).find(k => schedule[k].name === name && schedule[k].link);
        if(foundKey) {
            document.getElementById('linkInp').value = schedule[foundKey].link;
        }
    }

    function updateDatalist() {
        const subjects = new Set();
        Object.values(schedule).forEach(v => subjects.add(v.name));
        const dl = document.getElementById('subjectsList');
        dl.innerHTML = '';
        subjects.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s;
            dl.appendChild(opt);
        });
    }

    // --- MODALS ---
    function openEditModal(key) {
        currentEditKey = key;
        const slotIdx = key.split('-')[1];
        
        const data = schedule[key];
        const suggestions = suggestTime(slotIdx);

        document.getElementById('nameInp').value = data ? data.name : '';
        document.getElementById('startInp').value = data ? data.start : suggestions.start;
        document.getElementById('endInp').value = data ? data.end : suggestions.end;
        document.getElementById('linkInp').value = data ? data.link : '';
        
        document.getElementById('modal').style.display = 'flex';
        setTimeout(() => document.getElementById('modal').classList.add('open'), 10);
    }

    function closeModal(id) {
        const m = document.getElementById(id);
        m.classList.remove('open');
        setTimeout(() => m.style.display = 'none', 300);
    }

    function saveLesson() {
        schedule[currentEditKey] = {
            name: document.getElementById('nameInp').value,
            start: document.getElementById('startInp').value,
            end: document.getElementById('endInp').value,
            link: document.getElementById('linkInp').value
        };
        localStorage.setItem('gh-schedule', JSON.stringify(schedule));
        render();
        closeModal('modal');
    }

    function deleteLesson() {
        if(schedule[currentEditKey]) {
            delete schedule[currentEditKey];
            localStorage.setItem('gh-schedule', JSON.stringify(schedule));
            render();
        }
        closeModal('modal');
    }

    function toggleEditMode() {
        const body = document.body;
        const isEdit = body.getAttribute('data-edit-mode') === 'true';
        body.setAttribute('data-edit-mode', !isEdit);
        document.getElementById('toggleEdit').classList.toggle('active', !isEdit);
    }

    // --- SHARING ---
    function share() {
        // btoa не підтримує кирилицю напряму, тому використовуємо трюк з unescape(encodeURIComponent)
        const jsonStr = JSON.stringify(schedule);
        const encoded = btoa(unescape(encodeURIComponent(jsonStr)));
        const url = window.location.origin + window.location.pathname + '?data=' + encoded;
        
        navigator.clipboard.writeText(url).then(() => {
            alert("Посилання скопійовано! Відправ його друзям, і вони зможуть завантажити твій розклад.");
        }).catch(err => {
            alert("Не вдалося скопіювати. Спробуй вручну з адресного рядка (після натискання ОК)");
            window.location.search = '?data=' + encoded;
        });
    }

    // --- SETTINGS & THEMES ---
    function openSettings() {
        document.getElementById('settingsModal').style.display = 'flex';
        setTimeout(() => document.getElementById('settingsModal').classList.add('open'), 10);
        document.getElementById('bgSelect').value = userSettings.bg;
    }

    function setAccent(color) {
        userSettings.accent = color;
        saveSettings();
    }

    function changeBackground(type) {
        userSettings.bg = type;
        saveSettings();
    }

    function saveSettings() {
        localStorage.setItem('gh-settings', JSON.stringify(userSettings));
        applySettings();
    }

    function applySettings() {
        document.documentElement.style.setProperty('--accent', userSettings.accent);
        
        let bgStyle = '';
        switch(userSettings.bg) {
            case 'space': bgStyle = 'linear-gradient(to bottom, #000000, #434343)'; break;
            case 'sunset': bgStyle = 'linear-gradient(to right, #0b486b, #f56217)'; break;
            case 'forest': bgStyle = 'linear-gradient(to bottom, #134e5e, #71b280)'; break;
            case 'black': bgStyle = '#000000'; break;
            default: bgStyle = 'linear-gradient(135deg, #0f172a 0%, #1e293b 100%)';
        }
        document.documentElement.style.setProperty('--bg-image', bgStyle);
    }

    // Запуск
    init();
</script>
</body>
</html>
