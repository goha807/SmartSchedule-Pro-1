<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Schedule Pro | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            --card-bg: rgba(30, 41, 59, 0.5);
            --accent: #38bdf8;
            --danger: #ff4757;
            --success: #2ed573;
            --text: #f8fafc;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-image);
            background-attachment: fixed;
            color: var(--text);
            margin: 0;
            padding: 20px;
            padding-bottom: 140px;
            min-height: 100vh;
            line-height: 1.5;
            transition: all 0.5s ease;
        }

        /* Glassmorphism Effect */
        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        header {
            max-width: 1400px;
            margin: 0 auto 40px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
        }

        h1 {
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: -1px;
            margin: 0;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

        /* Buttons Style */
        .btn {
            padding: 12px 20px;
            border-radius: 14px;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            background: rgba(255,255,255,0.05);
        }
        
        .btn:hover { 
            background: rgba(255,255,255,0.1); 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .btn-primary { 
            background: var(--accent); 
            color: #000; 
            border: none;
        }
        .btn-primary:hover { 
            filter: brightness(1.1);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }
        
        .btn-outline.active { background: var(--accent); color: #000; }

        /* Grid */
        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .day-column { 
            padding: 10px; 
            border-radius: 24px;
            transition: background 0.3s;
        }
        .day-column.is-today {
            background: rgba(56, 189, 248, 0.05);
            outline: 1px solid rgba(56, 189, 248, 0.2);
        }

        .day-title {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 25px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
            padding-left: 10px;
        }

        .day-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--accent);
            border-radius: 4px;
        }

        /* Lesson Card */
        .lesson-card {
            margin-bottom: 16px;
            padding: 20px;
            position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--glass-border);
            animation: fadeIn 0.5s ease backwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .lesson-card:hover {
            border-color: rgba(56, 189, 248, 0.5);
            background: rgba(255,255,255,0.08);
            transform: scale(1.02);
        }

        .lesson-card.active {
            border-color: var(--success);
            background: linear-gradient(135deg, rgba(46, 213, 115, 0.1) 0%, rgba(30, 41, 59, 0.8) 100%);
        }

        .time-badge {
            font-size: 0.75rem;
            background: rgba(0,0,0,0.3);
            padding: 4px 10px;
            border-radius: 8px;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 12px;
            display: inline-block;
        }

        .lesson-name {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 8px;
            display: block;
        }

        .lesson-link {
            font-size: 0.85rem;
            color: #94a3b8;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
        }
        .lesson-link:hover { color: var(--accent); }

        .progress-container {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 4px;
            background: rgba(255,255,255,0.05); overflow: hidden;
        }
        .progress-bar { height: 100%; background: var(--success); transition: width 1s linear; }

        .edit-btn {
            position: absolute; top: 10px; right: 10px; opacity: 0;
            background: var(--accent); border: none; padding: 8px;
            border-radius: 10px; cursor: pointer; transition: 0.3s;
        }
        [data-edit-mode="true"] .edit-btn { opacity: 1; }

        /* Widget */
        .current-widget {
            position: fixed; bottom: 30px; left: 30px; width: 340px; z-index: 100;
            padding: 20px; transform: translateX(-150%); transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1.2);
        }
        .current-widget.visible { transform: translateX(0); }

        /* Modal */
        .modal-backdrop {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px); display: none; justify-content: center;
            align-items: center; z-index: 200; opacity: 0; transition: 0.3s;
        }
        .modal { width: 90%; max-width: 480px; padding: 30px; transform: scale(0.9); transition: 0.3s; }
        .modal-backdrop.open { opacity: 1; }
        .modal-backdrop.open .modal { transform: scale(1); }

        input, select {
            width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--glass-border);
            color: #fff; padding: 14px; border-radius: 12px; margin-top: 5px; outline: none;
        }
        input:focus { border-color: var(--accent); }

        @media (max-width: 768px) {
            header { flex-direction: column; text-align: center; gap: 15px; }
            .current-widget { left: 15px; right: 15px; width: auto; bottom: 15px; }
            .controls { width: 100%; }
            .btn { flex: 1; justify-content: center; padding: 10px; font-size: 0.8rem; }
        }
    </style>
</head>
<body data-edit-mode="false">

<input type="file" id="fileImportInput" style="display: none;" accept=".json" onchange="handleFileSelect(this)">

<header>
    <h1>📅 SchedulePro <span style="font-size: 0.8rem; vertical-align: middle; opacity: 0.6;">v2.3 Premium</span></h1>
    <div class="controls">
        <button class="btn" onclick="openSettings()">🎨 Вигляд</button>
        <button class="btn btn-outline" id="toggleEdit" onclick="toggleEditMode()">✏️ Ред.</button>
        <button class="btn" onclick="triggerImport()">📂 Відкрити</button>
        <button class="btn btn-primary" onclick="exportSchedule()">💾 Зберегти</button>
    </div>
</header>

<div class="schedule-grid" id="grid"></div>

<div class="current-widget glass" id="activeWidget">
    <div style="font-size: 0.7rem; text-transform: uppercase; color: var(--accent); font-weight: 800; margin-bottom: 10px;">Зараз триває</div>
    <div id="widgetName" style="font-size: 1.2rem; font-weight: 800; margin-bottom: 10px;">Назва</div>
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <span id="widgetTimes" style="font-family: monospace; opacity: 0.7;">08:30 - 09:15</span>
        <span id="widgetCountdown" style="color: var(--success); font-weight: 800; font-size: 1.1rem;">00 хв</span>
    </div>
    <a id="widgetLink" href="#" target="_blank" class="btn-primary btn" style="margin-top: 15px; justify-content: center; padding: 8px;">🎥 Приєднатися</a>
</div>

<div class="modal-backdrop" id="modal">
    <div class="modal glass">
        <h2 style="margin-top:0">Налаштування уроку</h2>
        <div style="display:grid; gap:15px;">
            <div>
                <label style="font-size:0.8rem; opacity:0.6">Предмет</label>
                <input type="text" id="nameInp" list="subjectsList" placeholder="Математика" oninput="autoFillLink()">
                <datalist id="subjectsList"></datalist>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div>
                    <label style="font-size:0.8rem; opacity:0.6">Початок</label>
                    <input type="time" id="startInp">
                </div>
                <div>
                    <label style="font-size:0.8rem; opacity:0.6">Кінець</label>
                    <input type="time" id="endInp">
                </div>
            </div>
            <div>
                <label style="font-size:0.8rem; opacity:0.6">Посилання</label>
                <input type="text" id="linkInp" placeholder="https://zoom.us/...">
            </div>
        </div>
        <div style="display:flex; gap:10px; margin-top:25px;">
            <button class="btn btn-primary" style="flex:2" onclick="saveLesson()">Зберегти</button>
            <button class="btn" style="flex:1; background:var(--danger)" onclick="deleteLesson()">🗑️</button>
            <button class="btn" style="flex:1" onclick="closeModal('modal')">Скасувати</button>
        </div>
    </div>
</div>

<div class="modal-backdrop" id="settingsModal">
    <div class="modal glass">
        <h2>Стилізація</h2>
        <div style="display:grid; gap:20px;">
            <div>
                <label>Колір теми</label>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <div style="width:35px; height:35px; border-radius:10px; background:#38bdf8; cursor:pointer;" onclick="setAccent('#38bdf8')"></div>
                    <div style="width:35px; height:35px; border-radius:10px; background:#2ed573; cursor:pointer;" onclick="setAccent('#2ed573')"></div>
                    <div style="width:35px; height:35px; border-radius:10px; background:#ffa502; cursor:pointer;" onclick="setAccent('#ffa502')"></div>
                    <div style="width:35px; height:35px; border-radius:10px; background:#ff4757; cursor:pointer;" onclick="setAccent('#ff4757')"></div>
                    <div style="width:35px; height:35px; border-radius:10px; background:#a29bfe; cursor:pointer;" onclick="setAccent('#a29bfe')"></div>
                </div>
            </div>
            <div>
                <label>Шпалери</label>
                <select id="bgSelect" onchange="changeBackground(this.value)">
                    <option value="default">🌌 Нічне небо</option>
                    <option value="sunset">🌇 Захід сонця</option>
                    <option value="forest">🌲 Глибокий ліс</option>
                    <option value="black">🌑 Pure Black (OLED)</option>
                </select>
            </div>
            <div style="border-top: 1px solid var(--glass-border); padding-top: 15px;">
                <label style="color: var(--danger)">Небезпечна зона</label>
                <button class="btn" style="background: rgba(255, 71, 87, 0.2); color: var(--danger); width: 100%; margin-top: 10px;" onclick="clearAllData()">🗑️ Очистити весь розклад</button>
            </div>
        </div>
        <button class="btn btn-primary" style="width:100%; margin-top:30px;" onclick="closeModal('settingsModal')">Готово</button>
    </div>
</div>

<script>
    const days = ["Понеділок", "Вівторок", "Середа", "Четвер", "П'ятниця", "Субота", "Неділя"];
    const icons = ["⚡", "🔥", "💎", "🌟", "🍀", "🎉", "🎐"];
    let schedule = JSON.parse(localStorage.getItem('gh-schedule')) || {};
    let userSettings = JSON.parse(localStorage.getItem('gh-settings')) || { accent: '#38bdf8', bg: 'default' };
    
    let currentEditKey = null;
    let activeLessonGlobal = null;

    function init() {
        applySettings();
        // Перевірка на старий метод URL (для зворотної сумісності)
        const params = new URLSearchParams(window.location.search);
        if (params.get('data')) {
            try {
                const rawData = fromBinary(params.get('data'));
                const imported = Array.isArray(rawData) ? decompressSchedule(rawData) : rawData;
                if(confirm("Завантажити імпортований розклад з посилання?")) {
                    schedule = imported;
                    localStorage.setItem('gh-schedule', JSON.stringify(schedule));
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
            } catch(e) { console.error("URL Import error"); }
        }
        render();
        setInterval(render, 5000);
    }

    // --- ФУНКЦІОНАЛ ФАЙЛІВ (НОВЕ) ---
    
    function exportSchedule() {
        // Створюємо JSON файл
        const dataStr = JSON.stringify(schedule, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        
        // Створюємо тимчасове посилання для скачування
        const a = document.createElement('a');
        a.href = url;
        a.download = `rozklad_${new Date().toISOString().slice(0,10)}.json`;
        document.body.appendChild(a);
        a.click();
        
        // Прибираємо сміття
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        alert("✅ Файл розкладу завантажено! Надішли його другу.");
    }

    function triggerImport() {
        document.getElementById('fileImportInput').click();
    }

    function handleFileSelect(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const json = JSON.parse(e.target.result);
                // Проста валідація
                if (typeof json === 'object' && json !== null) {
                    if(confirm("Це замінить ваш поточний розклад. Продовжити?")) {
                        schedule = json;
                        localStorage.setItem('gh-schedule', JSON.stringify(schedule));
                        render();
                        alert("✅ Розклад успішно імпортовано!");
                    }
                } else {
                    alert("❌ Помилка: Невірний формат файлу.");
                }
            } catch (error) {
                alert("❌ Помилка читання файлу.");
            }
            // Очистити інпут, щоб можна було завантажити той самий файл знову
            input.value = ''; 
        };
        reader.readAsText(file);
    }

    function clearAllData() {
        if(confirm("Ви точно хочете видалити ВЕСЬ розклад? Це не можна скасувати.")) {
            schedule = {};
            localStorage.setItem('gh-schedule', JSON.stringify(schedule));
            render();
            closeModal('settingsModal');
        }
    }

    // --- Старі функції (трохи оптимізовані) ---

    function toBinary(string) {
        const codeUnits = new Uint16Array(string.length);
        for (let i = 0; i < codeUnits.length; i++) codeUnits[i] = string.charCodeAt(i);
        const charCodes = new Uint8Array(codeUnits.buffer);
        let result = '';
        for (let i = 0; i < charCodes.byteLength; i++) result += String.fromCharCode(charCodes[i]);
        return btoa(result);
    }

    function fromBinary(binary) {
        const bytes = atob(binary);
        const source = new Uint8Array(bytes.length);
        for (let i = 0; i < bytes.length; i++) source[i] = bytes.charCodeAt(i);
        const buffer = new Uint16Array(source.buffer);
        let result = '';
        for (let i = 0; i < buffer.length; i++) result += String.fromCharCode(buffer[i]);
        return JSON.parse(result);
    }

    function compressSchedule(sched) {
        return Object.keys(sched).map(k => [k, sched[k].name, sched[k].start, sched[k].end, sched[k].link]);
    }

    function decompressSchedule(arr) {
        let s = {};
        arr.forEach(i => s[i[0]] = {name:i[1], start:i[2], end:i[3], link:i[4]});
        return s;
    }

    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        activeLessonGlobal = null;
        
        const now = new Date();
        const currentTime = now.getHours() * 60 + now.getMinutes();
        const currentDay = (now.getDay() + 6) % 7; 

        days.forEach((day, dIdx) => {
            const isToday = dIdx === currentDay;
            const dayCol = document.createElement('div');
            dayCol.className = `day-column ${isToday ? 'is-today' : ''}`;
            dayCol.innerHTML = `<div class="day-title"><span>${icons[dIdx]}</span> ${day}</div>`;

            for(let sIdx = 0; sIdx < 8; sIdx++) {
                const key = `${dIdx}-${sIdx}`;
                const data = schedule[key] || null;
                dayCol.appendChild(createLessonCard(data, key, isToday, currentTime, sIdx));
            }
            grid.appendChild(dayCol);
        });

        updateWidget();
    }

    function createLessonCard(data, key, isToday, currentTime, index) {
        const card = document.createElement('div');
        card.className = 'lesson-card glass';
        card.style.animationDelay = `${index * 0.05}s`;
        
        if (!data) {
            card.innerHTML = `<div style="opacity:0.2; text-align:center; font-size:0.8rem">порожньо</div>
                              <button class="edit-btn" onclick="openEditModal('${key}')">➕</button>`;
            card.onclick = () => { if(document.body.getAttribute('data-edit-mode') === 'true') openEditModal(key) };
            return card;
        }

        const start = timeToMin(data.start);
        const end = timeToMin(data.end);
        let progressHtml = '';

        if (isToday && currentTime >= start && currentTime < end) {
            card.classList.add('active');
            const percent = ((currentTime - start) / (end - start)) * 100;
            progressHtml = `<div class="progress-container"><div class="progress-bar" style="width:${percent}%"></div></div>`;
            activeLessonGlobal = { ...data, remaining: end - currentTime };
        }

        card.innerHTML = `
            <button class="edit-btn" onclick="event.stopPropagation(); openEditModal('${key}')">⚙️</button>
            <div class="time-badge">${data.start} — ${data.end}</div>
            <span class="lesson-name">${data.name}</span>
            ${data.link ? `<a href="${data.link}" target="_blank" class="lesson-link" onclick="event.stopPropagation()">🔗 Приєднатися</a>` : ''}
            ${progressHtml}
        `;
        card.onclick = () => { if(document.body.getAttribute('data-edit-mode') === 'true') openEditModal(key) };
        return card;
    }

    function updateWidget() {
        const w = document.getElementById('activeWidget');
        if (activeLessonGlobal) {
            w.classList.add('visible');
            document.getElementById('widgetName').textContent = activeLessonGlobal.name;
            document.getElementById('widgetTimes').textContent = `${activeLessonGlobal.start} - ${activeLessonGlobal.end}`;
            document.getElementById('widgetCountdown').textContent = `${activeLessonGlobal.remaining} хв`;
            const linkBtn = document.getElementById('widgetLink');
            if(activeLessonGlobal.link) { linkBtn.style.display = 'flex'; linkBtn.href = activeLessonGlobal.link; }
            else { linkBtn.style.display = 'none'; }
        } else { w.classList.remove('visible'); }
    }

    function timeToMin(t) { if(!t) return 0; const [h, m] = t.split(':').map(Number); return h * 60 + m; }
    
    function suggestTime(slotIndex) {
        for(let d = 0; d < 7; d++) {
            const k = `${d}-${slotIndex}`;
            if(schedule[k]) return { s: schedule[k].start, e: schedule[k].end };
        }
        return { s: '08:30', e: '09:15' };
    }

    function autoFillLink() {
        const val = document.getElementById('nameInp').value.trim();
        const found = Object.values(schedule).find(i => i.name === val && i.link);
        if(found) document.getElementById('linkInp').value = found.link;
    }

    function openEditModal(key) {
        currentEditKey = key;
        const data = schedule[key];
        const sugg = suggestTime(key.split('-')[1]);
        document.getElementById('nameInp').value = data ? data.name : '';
        document.getElementById('startInp').value = data ? data.start : sugg.s;
        document.getElementById('endInp').value = data ? data.end : sugg.e;
        document.getElementById('linkInp').value = data ? data.link : '';
        const m = document.getElementById('modal');
        m.style.display = 'flex';
        setTimeout(() => m.classList.add('open'), 10);
    }

    function closeModal(id) {
        const m = document.getElementById(id);
        m.classList.remove('open');
        setTimeout(() => m.style.display = 'none', 300);
    }

    function saveLesson() {
        schedule[currentEditKey] = {
            name: document.getElementById('nameInp').value,
            start: document.getElementById('startInp').value,
            end: document.getElementById('endInp').value,
            link: document.getElementById('linkInp').value
        };
        localStorage.setItem('gh-schedule', JSON.stringify(schedule));
        render(); closeModal('modal');
    }

    function deleteLesson() {
        delete schedule[currentEditKey];
        localStorage.setItem('gh-schedule', JSON.stringify(schedule));
        render(); closeModal('modal');
    }

    function toggleEditMode() {
        const mode = document.body.getAttribute('data-edit-mode') === 'false';
        document.body.setAttribute('data-edit-mode', mode);
        document.getElementById('toggleEdit').classList.toggle('active', mode);
    }

    function openSettings() {
        const m = document.getElementById('settingsModal');
        m.style.display = 'flex';
        setTimeout(() => m.classList.add('open'), 10);
    }

    function setAccent(c) { userSettings.accent = c; saveSettings(); }
    function changeBackground(v) { userSettings.bg = v; saveSettings(); }
    function saveSettings() { localStorage.setItem('gh-settings', JSON.stringify(userSettings)); applySettings(); }

    function applySettings() {
        document.documentElement.style.setProperty('--accent', userSettings.accent);
        let bg = 'radial-gradient(circle at top right, #1e293b, #0f172a)';
        if(userSettings.bg === 'sunset') bg = 'linear-gradient(135deg, #2c3e50, #000000)';
        if(userSettings.bg === 'forest') bg = 'linear-gradient(135deg, #134e5e, #1e293b)';
        if(userSettings.bg === 'black') bg = '#000';
        document.documentElement.style.setProperty('--bg-image', bg);
    }

    init();
</script>
</body>
</html>
