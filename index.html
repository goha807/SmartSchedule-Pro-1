<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Schedule Pro | Ultra</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            --card-bg: rgba(30, 41, 59, 0.4);
            --accent: #38bdf8;
            --danger: #ff4757;
            --success: #2ed573;
            --warning: #fbbf24;
            --text: #f8fafc;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-image);
            background-attachment: fixed;
            color: var(--text);
            margin: 0;
            padding: 20px;
            padding-bottom: 140px;
            min-height: 100vh;
            line-height: 1.5;
        }

        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        header {
            max-width: 1400px;
            margin: 0 auto 30px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
        }

        .header-left h1 {
            font-weight: 800;
            font-size: 1.6rem;
            margin: 0;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #topClock {
            font-size: 0.9rem;
            opacity: 0.7;
            font-weight: 600;
            margin-top: 4px;
        }

        .controls { display: flex; gap: 10px; flex-wrap: wrap; }

        .btn {
            padding: 10px 18px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #fff;
            background: rgba(255,255,255,0.05);
        }
        
        .btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
        .btn-primary { background: var(--accent); color: #0f172a; border: none; }
        .btn-outline.active { background: var(--accent); color: #0f172a; }

        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .day-column { 
            padding: 15px; 
            border-radius: 28px;
            background: rgba(255,255,255,0.02);
        }
        .day-column.is-today {
            background: rgba(56, 189, 248, 0.05);
            box-shadow: inset 0 0 20px rgba(56, 189, 248, 0.1);
        }

        .day-title {
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* --- New Lesson Card Design --- */
        .lesson-card {
            margin-bottom: 12px;
            padding: 16px;
            position: relative;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--glass-border);
            overflow: hidden;
        }

        .lesson-card:hover {
            transform: scale(1.02);
            border-color: rgba(56, 189, 248, 0.4);
            background: rgba(255,255,255,0.07);
        }

        .lesson-card.active {
            border-color: var(--success);
            background: rgba(46, 213, 115, 0.08);
            box-shadow: 0 0 20px rgba(46, 213, 115, 0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .time-badge {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--accent);
            background: rgba(56, 189, 248, 0.1);
            padding: 4px 8px;
            border-radius: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #475569;
        }
        .active .status-dot {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .lesson-name {
            font-weight: 700;
            font-size: 1.05rem;
            margin-bottom: 6px;
            display: block;
        }

        .countdown-text {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--success);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .lesson-link {
            font-size: 0.8rem;
            color: #94a3b8;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 8px;
            padding: 4px 8px;
            border-radius: 6px;
            background: rgba(255,255,255,0.03);
        }
        .lesson-link:hover { color: var(--accent); background: rgba(255,255,255,0.08); }

        .progress-container {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 3px;
            background: rgba(255,255,255,0.05);
        }
        .progress-bar { height: 100%; background: var(--success); transition: width 1s linear; }

        .edit-btn {
            position: absolute; top: 12px; right: 12px; opacity: 0;
            background: var(--accent); border: none; padding: 6px;
            border-radius: 8px; cursor: pointer; transition: 0.2s;
        }
        [data-edit-mode="true"] .edit-btn { opacity: 1; }

        .current-widget {
            position: fixed; bottom: 30px; left: 30px; width: 340px; z-index: 100;
            padding: 20px; transform: translateX(-150%); transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1.2);
        }
        .current-widget.visible { transform: translateX(0); }

        .modal-backdrop {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px); display: none; justify-content: center;
            align-items: center; z-index: 200; opacity: 0; transition: 0.3s;
        }
        .modal { width: 90%; max-width: 480px; padding: 25px; transform: scale(0.9); transition: 0.3s; }
        .modal-backdrop.open { opacity: 1; }
        .modal-backdrop.open .modal { transform: scale(1); }

        input {
            width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--glass-border);
            color: #fff; padding: 12px; border-radius: 12px; margin-top: 5px; outline: none;
        }

        @media (max-width: 768px) {
            header { flex-direction: column; text-align: center; gap: 15px; }
            .current-widget { left: 15px; right: 15px; width: auto; bottom: 15px; }
            .controls { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body data-edit-mode="false">

<input type="file" id="fileImportInput" style="display: none;" accept=".json" onchange="handleFileSelect(this)">

<header>
    <div class="header-left">
        <h1>📅 SchedulePro <span style="font-size: 0.7rem; opacity: 0.5;">v3.0 Ultra</span></h1>
        <div id="topClock">Завантаження...</div>
    </div>
    <div class="controls">
        <button class="btn" onclick="openSettings()">🎨 Стиль</button>
        <button class="btn btn-outline" id="toggleEdit" onclick="toggleEditMode()">✏️ Ред.</button>
        <button class="btn" onclick="triggerImport()">📂 Відкрити</button>
        <button class="btn btn-primary" onclick="exportSchedule()">💾 Зберегти</button>
    </div>
</header>

<div class="schedule-grid" id="grid"></div>

<div class="current-widget glass" id="activeWidget">
    <div style="font-size: 0.65rem; text-transform: uppercase; color: var(--accent); font-weight: 800; margin-bottom: 8px; letter-spacing: 1px;">Зараз у процесі</div>
    <div id="widgetName" style="font-size: 1.2rem; font-weight: 800; margin-bottom: 8px;">Назва уроку</div>
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <span id="widgetTimes" style="font-size: 0.85rem; opacity: 0.6; font-family: monospace;">00:00 - 00:00</span>
        <span id="widgetCountdown" style="color: var(--success); font-weight: 800; font-size: 1rem;">---</span>
    </div>
    <a id="widgetLink" href="#" target="_blank" class="btn-primary btn" style="justify-content: center; width: 100%;">🚀 Увійти в Zoom/Meet</a>
</div>

<div class="modal-backdrop" id="modal">
    <div class="modal glass">
        <h2 style="margin-top:0; font-size: 1.3rem;">Налаштування уроку</h2>
        <div style="display:grid; gap:12px;">
            <div>
                <label style="font-size:0.75rem; opacity:0.6">Назва предмета</label>
                <input type="text" id="nameInp" placeholder="Наприклад: Фізика">
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div>
                    <label style="font-size:0.75rem; opacity:0.6">Початок</label>
                    <input type="time" id="startInp">
                </div>
                <div>
                    <label style="font-size:0.75rem; opacity:0.6">Кінець</label>
                    <input type="time" id="endInp">
                </div>
            </div>
            <div>
                <label style="font-size:0.75rem; opacity:0.6">Посилання</label>
                <input type="text" id="linkInp" placeholder="https://...">
            </div>
        </div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn btn-primary" style="flex:2" onclick="saveLesson()">Зберегти</button>
            <button class="btn" style="flex:1; background:var(--danger)" onclick="deleteLesson()">🗑️</button>
            <button class="btn" style="flex:1" onclick="closeModal('modal')">❌</button>
        </div>
    </div>
</div>

<script>
    const days = ["Понеділок", "Вівторок", "Середа", "Четвер", "П'ятниця", "Субота", "Неділя"];
    const icons = ["⚡", "🔥", "💎", "🌟", "🍀", "🎉", "🎐"];
    let schedule = JSON.parse(localStorage.getItem('gh-schedule')) || {};
    let userSettings = JSON.parse(localStorage.getItem('gh-settings')) || { accent: '#38bdf8', bg: 'default' };
    let currentEditKey = null;
    let activeLessonGlobal = null;

    function init() {
        applySettings();
        updateTime();
        render();
        setInterval(updateTime, 1000);
        setInterval(render, 1000); // Оновлення кожну секунду для плавних таймерів
    }

    function updateTime() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('uk-UA', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const dateStr = now.toLocaleDateString('uk-UA', { weekday: 'long', day: 'numeric', month: 'long' });
        document.getElementById('topClock').innerHTML = `${timeStr} • <span style="text-transform: capitalize;">${dateStr}</span>`;
    }

    // Розумне форматування залишку часу
    function formatRemaining(minutes) {
        if (minutes <= 0) return "Закінчено";
        const h = Math.floor(minutes / 60);
        const m = minutes % 60;
        if (h > 0) return `${h} г ${m} хв`;
        return `${m} хв`;
    }

    function render() {
        const grid = document.getElementById('grid');
        const oldGridHTML = grid.innerHTML;
        activeLessonGlobal = null;
        
        const now = new Date();
        const currentTime = now.getHours() * 60 + now.getMinutes();
        const currentDay = (now.getDay() + 6) % 7; 

        let newHTML = '';
        days.forEach((day, dIdx) => {
            const isToday = dIdx === currentDay;
            let dayHTML = `<div class="day-column ${isToday ? 'is-today' : ''}">
                <div class="day-title"><span>${icons[dIdx]}</span> ${day}</div>`;

            for(let sIdx = 0; sIdx < 8; sIdx++) {
                const key = `${dIdx}-${sIdx}`;
                const data = schedule[key] || null;
                dayHTML += createLessonCardHTML(data, key, isToday, currentTime);
            }
            dayHTML += `</div>`;
            newHTML += dayHTML;
        });

        // Оновлюємо DOM лише якщо щось змінилося, щоб не було миготіння
        grid.innerHTML = newHTML;
        updateWidget();
    }

    function createLessonCardHTML(data, key, isToday, currentTime) {
        if (!data) {
            return `<div class="lesson-card glass" style="opacity:0.3; border-style: dashed;" onclick="handleCardClick('${key}')">
                <div style="text-align:center; font-size:0.7rem;">+ Додати</div>
                <button class="edit-btn" onclick="openEditModal('${key}')">➕</button>
            </div>`;
        }

        const start = timeToMin(data.start);
        const end = timeToMin(data.end);
        let activeClass = '';
        let progressHtml = '';
        let countdownHtml = '';

        if (isToday && currentTime >= start && currentTime < end) {
            activeClass = 'active';
            const percent = ((currentTime - start) / (end - start)) * 100;
            progressHtml = `<div class="progress-container"><div class="progress-bar" style="width:${percent}%"></div></div>`;
            const rem = end - currentTime;
            countdownHtml = `<div class="countdown-text">⏳ ${formatRemaining(rem)}</div>`;
            activeLessonGlobal = { ...data, remaining: rem };
        }

        return `
            <div class="lesson-card glass ${activeClass}" onclick="handleCardClick('${key}')">
                <button class="edit-btn" onclick="event.stopPropagation(); openEditModal('${key}')">⚙️</button>
                <div class="card-header">
                    <div class="time-badge">${data.start} — ${data.end}</div>
                    <div class="status-dot"></div>
                </div>
                <span class="lesson-name">${data.name}</span>
                ${countdownHtml}
                ${data.link ? `<a href="${data.link}" target="_blank" class="lesson-link" onclick="event.stopPropagation()">🔗 Посилання</a>` : ''}
                ${progressHtml}
            </div>
        `;
    }

    function handleCardClick(key) {
        if(document.body.getAttribute('data-edit-mode') === 'true') {
            openEditModal(key);
        }
    }

    function updateWidget() {
        const w = document.getElementById('activeWidget');
        if (activeLessonGlobal) {
            w.classList.add('visible');
            document.getElementById('widgetName').textContent = activeLessonGlobal.name;
            document.getElementById('widgetTimes').textContent = `${activeLessonGlobal.start} - ${activeLessonGlobal.end}`;
            document.getElementById('widgetCountdown').textContent = formatRemaining(activeLessonGlobal.remaining);
            const linkBtn = document.getElementById('widgetLink');
            if(activeLessonGlobal.link) { linkBtn.style.display = 'flex'; linkBtn.href = activeLessonGlobal.link; }
            else { linkBtn.style.display = 'none'; }
        } else { w.classList.remove('visible'); }
    }

    function timeToMin(t) { if(!t) return 0; const [h, m] = t.split(':').map(Number); return h * 60 + m; }

    function openEditModal(key) {
        currentEditKey = key;
        const data = schedule[key];
        document.getElementById('nameInp').value = data ? data.name : '';
        document.getElementById('startInp').value = data ? data.start : '08:30';
        document.getElementById('endInp').value = data ? data.end : '09:15';
        document.getElementById('linkInp').value = data ? data.link : '';
        const m = document.getElementById('modal');
        m.style.display = 'flex';
        setTimeout(() => m.classList.add('open'), 10);
    }

    function closeModal(id) {
        const m = document.getElementById(id);
        m.classList.remove('open');
        setTimeout(() => m.style.display = 'none', 300);
    }

    function saveLesson() {
        const name = document.getElementById('nameInp').value;
        if(!name) return alert("Введіть назву!");
        schedule[currentEditKey] = {
            name: name,
            start: document.getElementById('startInp').value,
            end: document.getElementById('endInp').value,
            link: document.getElementById('linkInp').value
        };
        localStorage.setItem('gh-schedule', JSON.stringify(schedule));
        render(); closeModal('modal');
    }

    function deleteLesson() {
        delete schedule[currentEditKey];
        localStorage.setItem('gh-schedule', JSON.stringify(schedule));
        render(); closeModal('modal');
    }

    function toggleEditMode() {
        const mode = document.body.getAttribute('data-edit-mode') === 'false';
        document.body.setAttribute('data-edit-mode', mode);
        document.getElementById('toggleEdit').classList.toggle('active', mode);
    }

    function exportSchedule() {
        const blob = new Blob([JSON.stringify(schedule, null, 2)], { type: "application/json" });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `schedule_backup.json`;
        a.click();
    }

    function triggerImport() { document.getElementById('fileImportInput').click(); }

    function handleFileSelect(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            schedule = JSON.parse(e.target.result);
            localStorage.setItem('gh-schedule', JSON.stringify(schedule));
            render();
        };
        reader.readAsText(file);
    }

    function applySettings() {
        document.documentElement.style.setProperty('--accent', userSettings.accent);
    }

    function openSettings() {
        const color = prompt("Введіть HEX код кольору (напр. #ff4757):", userSettings.accent);
        if(color) {
            userSettings.accent = color;
            localStorage.setItem('gh-settings', JSON.stringify(userSettings));
            applySettings();
        }
    }

    init();
</script>
</body>
</html>
